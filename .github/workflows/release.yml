name: release

# v* 태그를 push 하면 플랫폼별 릴리스 바이너리를 빌드해 tar.gz + sha256 로 GitHub Release
# 에 첨부한다. workflow_dispatch 로는 빌드/패키징만 확인할 수 있다(게시 없음).
#
# prebuilt 바이너리는 기본 빌드(키워드 + hashing 검색)다. 로컬 ONNX 의미 검색이 필요하면
# 소스에서 `--features fastembed` 로 빌드한다(무거운 ort 의존이라 릴리스에는 넣지 않는다).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # Release 생성/자산 업로드

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (arm64 러너)
            target: aarch64-apple-darwin
          - os: macos-14        # Intel 바이너리는 arm64 러너에서 크로스 컴파일 - 희소한
            target: x86_64-apple-darwin   # macos-13(Intel) 러너 의존을 제거한다.
          # build on the oldest supported glibc (22.04 = 2.35) so the binary runs on
          # 22.04+ - ubuntu-latest(24.04) produced GLIBC_2.38+ binaries that fail on
          # 22.04 servers.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      # cozo/RocksDB(C++)의 librocksdb-sys 는 bindgen(libclang)이 필요하다 - Linux 러너에 설치.
      # macOS 러너는 clang 이 기본 포함.
      - name: install build deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --locked --bin supragnosis --target ${{ matrix.target }}

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          name="supragnosis-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/supragnosis" "dist/${name}/"
          cp README.md "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          # 체크섬: Linux 는 sha256sum, macOS 는 shasum.
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi

      # 태그가 아닌 실행(workflow_dispatch)에서도 산출물을 받아 빌드를 검증할 수 있게 한다.
      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: supragnosis-${{ matrix.target }}
          path: dist/*.tar.gz*

      # 릴리스 노트는 저장소에 커밋된 docs/releases/<tag>.md 를 쓴다(관리자가 릴리스마다
      # 직접 작성 - 버전 관리되는 노트). 파일이 없으면 GitHub 자동 생성으로 폴백한다.
      - name: resolve release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          f="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$f" ]; then echo "path=$f" >> "$GITHUB_OUTPUT"; else echo "path=" >> "$GITHUB_OUTPUT"; fi

      # 태그 push 일 때만 Release 에 자산 첨부(여러 잡이 같은 Release 에 누적).
      - name: publish to release (committed notes)
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: publish to release (auto notes)
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.path == ''
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  # 데스크탑 셸(.app, universal 바이너리)을 빌드해 서명/노터라이즈 후 zip 으로 릴리스에
  # 첨부한다. Homebrew cask 가 이 zip 을 소스로 쓴다(DMG 없음 - deploy/homebrew/README.md).
  # 서명 시크릿이 없으면(workflow_dispatch, 포크) 서명 없이 빌드만 검증한다.
  app:
    name: build desktop app (macos universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: app-universal

      # 시크릿이 있을 때만 tauri 번들러의 서명/노터라이즈 환경 변수를 켠다. 빈 문자열을
      # 넘기면 번들러가 서명을 시도하다 실패하므로, 존재 확인 후 GITHUB_ENV 로만 내보낸다.
      - name: enable signing + notarization (when secrets exist)
        shell: bash
        env:
          APPLE_CERTIFICATE_S: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_S: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_S: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_S: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_S: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_S: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "$APPLE_SIGNING_IDENTITY_S" ]; then
            for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              s="${v}_S"
              printf '%s<<__EOV__\n%s\n__EOV__\n' "$v" "${!s}" >> "$GITHUB_ENV"
            done
            echo "signing + notarization enabled"
          else
            echo "no APPLE_SIGNING_IDENTITY secret - building unsigned"
          fi

      # tauri-cli 는 npm 패키지의 prebuilt 바이너리를 쓴다(cargo install 보다 수 분 빠름).
      # 프론트엔드 빌드는 없다 - 뷰어는 데몬이 서빙하고 셸은 정적 자산뿐이다.
      - name: build the desktop app (universal, signed when enabled)
        working-directory: app
        run: npx --yes @tauri-apps/cli@^2 build --target universal-apple-darwin

      - name: package app zip
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          app="target/universal-apple-darwin/release/bundle/macos/Supragnosis.app"
          name="Supragnosis-${version}-macos-universal.app.zip"
          mkdir -p dist
          # ditto 가 리소스 포크/서명을 보존한다(zip 대신 필수) - 노터라이즈 스테이플 유지.
          ditto -c -k --keepParent "$app" "dist/${name}"
          cd dist && shasum -a 256 "${name}" > "${name}.sha256"

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: supragnosis-app-macos-universal
          path: dist/*.app.zip*

      - name: resolve release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          f="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$f" ]; then echo "path=$f" >> "$GITHUB_OUTPUT"; else echo "path=" >> "$GITHUB_OUTPUT"; fi

      - name: publish to release (committed notes)
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/*.app.zip
            dist/*.app.zip.sha256

      - name: publish to release (auto notes)
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.path == ''
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.app.zip
            dist/*.app.zip.sha256
