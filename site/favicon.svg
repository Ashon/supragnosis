    <line x1="32" y1="32" x2="32" y2="17"/>
    <line x1="32" y1="32" x2="46.3" y2="27.4"/>
    <line x1="32" y1="32" x2="40.8" y2="44.1"/>
    <line x1="32" y1="32" x2="23.2" y2="44.1"/>
    <line x1="32" y1="32" x2="17.7" y2="27.4"/>
  </g>
</svg>
